<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8A2BE2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="url(#bg)" stroke="#8A2BE2" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="40" cy="40" r="38" fill="url(#glow)"/>

  <!-- Fireworks sparks -->
  <!-- Central burst -->
  <circle cx="40" cy="40" r="3" fill="#FFD700"/>

  <!-- Spark lines radiating outward -->
  <line x1="40" y1="40" x2="40" y2="18" stroke="#FF6B35" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="40" cy="16" r="2.5" fill="#FF6B35"/>

  <line x1="40" y1="40" x2="40" y2="62" stroke="#FF6B35" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="40" cy="64" r="2.5" fill="#FF6B35"/>

  <line x1="40" y1="40" x2="18" y2="40" stroke="#8A2BE2" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="16" cy="40" r="2.5" fill="#8A2BE2"/>

  <line x1="40" y1="40" x2="62" y2="40" stroke="#8A2BE2" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="64" cy="40" r="2.5" fill="#8A2BE2"/>

  <!-- Diagonal sparks -->
  <line x1="40" y1="40" x2="24" y2="24" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="22" r="2" fill="#00D4FF"/>

  <line x1="40" y1="40" x2="56" y2="24" stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="58" cy="22" r="2" fill="#00D4FF"/>

  <line x1="40" y1="40" x2="24" y2="56" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="58" r="2" fill="#FFD700"/>

  <line x1="40" y1="40" x2="56" y2="56" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="58" cy="58" r="2" fill="#FFD700"/>

  <!-- Small twinkle dots -->
  <circle cx="32" cy="28" r="1.2" fill="#FF6B35" opacity="0.8"/>
  <circle cx="52" cy="30" r="1" fill="#00D4FF" opacity="0.7"/>
  <circle cx="28" cy="50" r="1.2" fill="#8A2BE2" opacity="0.8"/>
  <circle cx="50" cy="52" r="1" fill="#FFD700" opacity="0.7"/>
</svg>
